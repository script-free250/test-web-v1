# ============================================================
#  STREAMIFY — GitHub Actions Deployment Workflow
#  Deploys the static website to GitHub Pages automatically
#  on every push to the main branch.
# ============================================================

name: 🚀 Deploy Streamify to GitHub Pages

# ─── Trigger: Run on every push to main ────────────────────
on:
  push:
    branches:
      - main          # Change to "master" if your default branch is master

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# ─── Permissions ────────────────────────────────────────────
permissions:
  contents: read
  pages:    write
  id-token: write

# ─── Prevent concurrent deployments ─────────────────────────
concurrency:
  group: "pages"
  cancel-in-progress: false

# ═══════════════════════════════════════════════════════════
#  JOBS
# ═══════════════════════════════════════════════════════════
jobs:

  # ──────────────────────────────────────────────────────────
  #  JOB 1: Build (validate structure, no build step needed
  #          for pure static sites — just verify files exist)
  # ──────────────────────────────────────────────────────────
  build:
    name: 🔨 Validate & Prepare Site
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Verify required files exist
      - name: ✅ Verify site structure
        run: |
          echo "── Checking required files ──────────────────"

          # Check for critical files
          for file in \
            "index.html" \
            "browse.html" \
            "player.html" \
            "css/style.css" \
            "js/app.js" \
            "js/content.js"; do
            if [ -f "$file" ]; then
              echo "  ✅  $file"
            else
              echo "  ❌  MISSING: $file"
              exit 1
            fi
          done

          echo ""
          echo "── All required files found! ─────────────────"
          echo "── Site size: $(du -sh . --exclude=.git | cut -f1)"

      # 3. Setup GitHub Pages
      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v5

      # 4. Upload the entire repository as a Pages artifact
      #    (excludes .github folder and .git for security)
      - name: 📦 Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repo root (all HTML, CSS, JS files)
          path: '.'

  # ──────────────────────────────────────────────────────────
  #  JOB 2: Deploy to GitHub Pages
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest

    # Only runs after build job succeeds
    needs: build

    # Set deployment environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Deploy the uploaded artifact to GitHub Pages
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Print the deployment URL in the workflow log
      - name: 🔗 Print deployment URL
        run: |
          echo "════════════════════════════════════════════"
          echo "  ✅  Streamify deployed successfully!"
          echo "  🌐  URL: ${{ steps.deployment.outputs.page_url }}"
          echo "════════════════════════════════════════════"
