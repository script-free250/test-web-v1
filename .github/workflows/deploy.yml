# ================================================================
#  STREAMIFY — GitHub Actions
#  يشغّل Playwright (متصفح Chromium حقيقي) لتجاوز Cloudflare
#  ثم يحدّث content.js ويرفع الموقع على GitHub Pages
# ================================================================

name: 🎬 Scrape & Deploy Streamify

on:
  schedule:
    - cron: "0 4 * * *"   # كل يوم 6 صبح بتوقيت القاهرة
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ════════════════════════════════════════════════════════════
  #  JOB 1: SCRAPE
  # ════════════════════════════════════════════════════════════
  scrape:
    name: 🔍 Scrape with Playwright
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 🚀 Run scraper
        run: |
          echo "══════════════════════════════════════════"
          echo "  🎬  تشغيل السكريبت..."
          echo "══════════════════════════════════════════"
          python scripts/scraper.py
        continue-on-error: true

      - name: 📊 Show result
        run: |
          if [ -f "js/content.js" ]; then
            echo "✅  content.js موجود"
            SIZE=$(wc -c < js/content.js)
            echo "📏  الحجم: $SIZE bytes"
            if [ "$SIZE" -gt 1000 ]; then
              echo "✅  الحجم طبيعي — يحتوي بيانات"
            else
              echo "⚠️  الحجم صغير جداً — ربما فشل السحب"
            fi
          else
            echo "❌  content.js غير موجود!"
          fi

      - name: 💾 Commit updated content.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/content.js
          if git diff --cached --quiet; then
            echo "ℹ️  لا تغيير جديد"
          else
            git commit -m "🤖 تحديث تلقائي — $(date '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅  تم رفع التحديث"
          fi

  # ════════════════════════════════════════════════════════════
  #  JOB 2: BUILD
  # ════════════════════════════════════════════════════════════
  build:
    name: 🔨 Build Site
    runs-on: ubuntu-latest
    needs: scrape

    steps:

      - name: 📥 Checkout (latest)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: ✅ Verify files
        run: |
          for f in "index.html" "browse.html" "player.html" "css/style.css" "js/app.js" "js/content.js"; do
            [ -f "$f" ] && echo "  ✅  $f" || { echo "  ❌  $f مفقود!"; exit 1; }
          done

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  # ════════════════════════════════════════════════════════════
  #  JOB 3: DEPLOY
  # ════════════════════════════════════════════════════════════
  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🔗 Site URL
        run: echo "🌐  ${{ steps.deployment.outputs.page_url }}"
