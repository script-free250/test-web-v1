name: 🎬 Scrape & Deploy Streamify

on:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  scrape:
    name: 🔍 Scrape Larozza Content
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 🚀 Run scraper
        run: python scripts/scraper.py
        continue-on-error: true

      - name: 💾 Commit updated content.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/content.js
          if git diff --cached --quiet; then
            echo "ℹ️  لا يوجد تغيير"
          else
            git commit -m "🤖 تحديث تلقائي — $(date '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

  build:
    name: 🔨 Build Site
    runs-on: ubuntu-latest
    needs: scrape

    steps:

      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: ✅ Verify required files
        run: |
          for file in "index.html" "browse.html" "player.html" "css/style.css" "js/app.js" "js/content.js"; do
            if [ -f "$file" ]; then
              echo "  ✅  $file"
            else
              echo "  ❌  مفقود: $file"
              exit 1
            fi
          done

      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
